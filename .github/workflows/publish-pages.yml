name: Publish GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - README.md
      - assets/**
      - profile-3d-contrib/**
      - .github/workflows/publish-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build static site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _site
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib import request

          readme = Path("README.md").read_text(encoding="utf-8")

          payload = {
            "text": readme,
            "mode": "gfm",
            "context": os.environ.get("GITHUB_REPOSITORY", ""),
          }

          req = request.Request(
            "https://api.github.com/markdown",
            data=json.dumps(payload).encode("utf-8"),
            headers={
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "User-Agent": "scornejob-pages-renderer",
              "X-GitHub-Api-Version": "2022-11-28",
            },
            method="POST",
          )

          with request.urlopen(req) as response:
            rendered = response.read().decode("utf-8")

          html = f"""<!doctype html>
          <html lang=\"en\">
          <head>
            <meta charset=\"utf-8\" />
            <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />
            <title>scornejob profile content</title>
            <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css\" />
            <style>
              body {{
                margin: 0;
                background: linear-gradient(180deg, #f6f8fa 0%, #eef2f7 100%);
              }}
              .markdown-body {{
                box-sizing: border-box;
                max-width: 980px;
                margin: 40px auto;
                padding: 45px;
                border: 1px solid #d0d7de;
                border-radius: 14px;
                background: #ffffff;
                box-shadow: 0 20px 60px rgba(31, 35, 40, 0.08);
              }}
              @media (max-width: 767px) {{
                .markdown-body {{
                  margin: 0;
                  padding: 22px;
                  border: 0;
                  border-radius: 0;
                  box-shadow: none;
                }}
              }}
              @media (prefers-color-scheme: dark) {{
                body {{
                  background: #0d1117;
                }}
                .markdown-body {{
                  background: #0d1117;
                  color: #c9d1d9;
                  border-color: #30363d;
                  box-shadow: none;
                }}
              }}
            </style>
          </head>
          <body>
            <article class=\"markdown-body\">{rendered}</article>
          </body>
          </html>
          """

          Path("_site/index.html").write_text(html, encoding="utf-8")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5