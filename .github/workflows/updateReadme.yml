name: "Update README.md"
on:
  workflow_dispatch: # disabled: replaced by sync-readme-metrics.yml

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update_readme:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: yoshi389111/github-profile-3d-contrib@latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        USERNAME: ${{ github.repository_owner }}
    - name: Generate README.md
      uses: actions/github-script@v8
      env:
        STATS_TOKEN: ${{ secrets.USER_TOKEN || secrets.GITHUB_TOKEN }}
        TARGET_FILE: README.md
      with:
        script: |
          const { run } = require('./scripts/generate_readme_from_template')
          await run({ github, core, context })
    - name: Update README.md
      run: |
        if [[ "$(git status --porcelain)" != "" ]]; then
        git config user.name "Seba Cornejo"
        git config user.email scornejo[bot]@users.noreply.github.com
        git add .
        git commit -m "Update README"
        git push
        fi
