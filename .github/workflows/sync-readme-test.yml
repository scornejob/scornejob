name: Sync README Test Copy

on:
  push:
    paths:
      - README.md
      - TEMPLATE.md
      - scripts/generate_readme_from_template.py
      - scripts/sync_waka_section.py
      - .github/workflows/sync-readme-test.yml
  workflow_dispatch:
    inputs:
      template_file:
        description: Source template file
        required: false
        default: TEMPLATE.md
      target_file:
        description: Target README test file
        required: false
        default: README-TEST.md
      waka_source_file:
        description: Source README used for waka section
        required: false
        default: README.md

permissions:
  contents: write

jobs:
  sync_readme_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        env:
          GIT_CONFIG_COUNT: "2"
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: master
          GIT_CONFIG_KEY_1: advice.defaultBranchName
          GIT_CONFIG_VALUE_1: "false"

      - name: Run sync script
        env:
          STATS_TOKEN: ${{ secrets.USER_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TEMPLATE="${{ github.event.inputs.template_file || 'TEMPLATE.md' }}"
          TARGET="${{ github.event.inputs.target_file || 'README-TEST.md' }}"
          WAKA_SOURCE="${{ github.event.inputs.waka_source_file || 'README.md' }}"

          python scripts/generate_readme_from_template.py --template "$TEMPLATE" --output "$TARGET"
          python scripts/sync_waka_section.py --source "$WAKA_SOURCE" --target "$TARGET"

      - name: Commit target file
        run: |
          TARGET="${{ github.event.inputs.target_file || 'README-TEST.md' }}"
          if [[ "$(git status --porcelain)" != "" ]]; then
            git config user.name "Seba Cornejo"
            git config user.email scornejo[bot]@users.noreply.github.com
            git add "$TARGET"
            git commit -m "Sync README-TEST from README"
            git push
          fi
