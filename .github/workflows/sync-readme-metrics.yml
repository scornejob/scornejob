name: Sync README Metrics

on:
  schedule:
    - cron: '0 2 * * 1-6' # incremental Mon-Sat at 2:00 UTC
    - cron: '0 3 * * 0' # full scan Sundays at 3:00 UTC
  push:
    paths:
      - TEMPLATE.md
      - scripts/sync_waka_section.py
      - .github/workflows/sync-readme-metrics.yml
  workflow_dispatch:
    inputs:
      target_file:
        description: Target README test file
        required: false
        default: README-TEST.md
      scan_mode:
        description: Repo scan mode (auto/full/incremental)
        required: false
        default: auto

permissions:
  contents: write

jobs:
  generate_readme_metrics:
    concurrency:
      group: update-readme-metrics
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        env:
          GIT_CONFIG_COUNT: "2"
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: master
          GIT_CONFIG_KEY_1: advice.defaultBranchName
          GIT_CONFIG_VALUE_1: "false"

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Generate README-TEST.md
        uses: actions/github-script@v8
        env:
          STATS_TOKEN: ${{ secrets.USER_TOKEN || secrets.GITHUB_TOKEN }}
          TARGET_FILE: ${{ github.event.inputs.target_file || 'README-TEST.md' }}
        with:
          script: |
            const { run } = require('./scripts/generate_readme_from_template')
            await run({ github, core, context })

      - name: Run waka sync script
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.WAKA_GH_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          REPO_STATS_CACHE_PATH: assets/repo_stats_cache.json
        run: |
          TARGET="${{ github.event.inputs.target_file || 'README-TEST.md' }}"
          SCAN_MODE="auto"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.scan_mode }}" ]]; then
            SCAN_MODE="${{ github.event.inputs.scan_mode }}"
          elif [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "0 3 * * 0" ]]; then
            SCAN_MODE="full"
          fi
          python scripts/sync_waka_section.py --target "$TARGET" --scan-mode "$SCAN_MODE"

      - name: Commit waka-populated file
        run: |
          TARGET="${{ github.event.inputs.target_file || 'README-TEST.md' }}"
          if [[ "$(git status --porcelain)" != "" ]]; then
            git config user.name "Seba Cornejo"
            git config user.email scornejo[bot]@users.noreply.github.com
            git add -A
            git commit -m "Generate README-TEST with API stats"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          fi
