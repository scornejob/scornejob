on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update README.md"]
    types:
        - completed

permissions:
  contents: write

jobs:
  add_stats:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref_name == 'feature/test-actions-manual') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    steps:
    - uses: anmol098/waka-readme-stats@master
      with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.WAKA_GH_TOKEN }}
          PULL_BRANCH_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          PUSH_BRANCH_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          MAX_REPOS: "20"
          SHOW_PROJECTS: "False"
          SHOW_LINES_OF_CODE: "False"
          SHOW_LOC_CHART: "False"
          LOCALE: "en"
          SHOW_UPDATED_DATE: "True"
          DEBUG_LOGGING: "True"
